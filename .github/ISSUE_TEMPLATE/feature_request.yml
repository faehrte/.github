name: Feature Request
description: Suggest an idea or an enhancement for the project.
title: "[Feature]: "
labels:
  - "type: feature"
body:
  - type: markdown
    attributes:
      value: |
        ## Feature Request Protocol
        Please focus on explaining the problem you are trying to solve before detailing your proposed solution.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please check all boxes before submitting.
      options:
        - label: I have searched the existing issues and this is not a duplicate.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Please describe.
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see implemented.
      placeholder: I would like the system to...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or workarounds you've already considered.
      placeholder: I tried doing X, but it is not ideal because...
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or screenshots about the feature request here.
      placeholder: Additional details...
    validations:
      required: false
