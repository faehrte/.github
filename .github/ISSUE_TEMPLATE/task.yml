name: Task / Maintenance
description: Internal tasks, refactoring, or maintenance work.
title: "[Task]: "
labels:
  - "type: maintenance"
body:
  - type: markdown
    attributes:
      value: |
        ## Task Overview
        Use this template for internal work items, technical debt, or maintenance tasks that do not change the functional scope of the project.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please check all boxes before submitting.
      options:
        - label: I have searched the existing issues and this is not a duplicate.
          required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done?
      placeholder: Refactor the authentication module to improve readability...
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Why is this task necessary?
      description: Explain the benefit of doing this (e.g., performance, maintainability, technical debt).
      placeholder: Currently, the code is hard to test because...
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: Acceptance Criteria / To-Do List
      description: What are the specific steps or requirements to consider this task 'done'?
      placeholder: |
        - [ ] Step 1: ...
        - [ ] Step 2: ...
        - [ ] Final Review
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Link to related issues, documentation, or relevant code sections.
      placeholder: Related to issue #123...
    validations:
      required: false
