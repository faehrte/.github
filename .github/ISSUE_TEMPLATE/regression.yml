name: Regression Report
description: Report a bug that used to work in a previous version but is now broken.
title: "[Regression]: "
labels:
  - "type/bug"
body:
  - type: markdown
    attributes:
      value: |
        ## Regression Protocol
        A regression is a previously working feature that broke after an update. Please help us identify when the break occurred.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please check all boxes before submitting.
      options:
        - label: I have searched the existing issues and this is not a duplicate.
          required: true
        - label: I have confirmed this worked in a previous version.
          required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the regression.
      placeholder: This feature worked in v1.0 but now...
    validations:
      required: true

  - type: input
    id: last-working-version
    attributes:
      label: Last Working Version
      description: Which version or commit was the last one where this worked?
      placeholder: e.g., v1.5.0 or commit hash 7b2d9e1
    validations:
      required: true

  - type: input
    id: first-broken-version
    attributes:
      label: First Broken Version
      description: Which version or commit introduced the bug?
      placeholder: e.g., v1.6.0
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to trigger the bug in the current (broken) version.
      placeholder: |
        1. Open '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: System details where the regression occurs.
      placeholder: |
        - OS: macOS 14.2
        - Browser: Chrome 121 (if applicable)
        - Runtime/Node.js: v20.10.0 (if applicable)
        - Framework/Package Version: ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs & Screenshots
      description: Paste stacktraces or attach screenshots.
      render: shell
      placeholder: Paste logs here...

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, workarounds, or links about the regression here.
      placeholder: Additional details...
    validations:
      required: false
